# android/gradle.properties
# Configurações de build do projeto Android (NutriFlow)

# Aumenta a memória da JVM para builds com Firebase/Flutter
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Habilita builds paralelos e cache incremental do Gradle
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.configureondemand=false

# Habilita o novo namespace de recursos do Android (evita warnings de deprecated)
android.useAndroidX=true
android.enableJetifier=true

# Necessário para compatibilidade com o Flutter e plugins mais recentes
android.nonTransitiveRClass=true

# Suprimir aviso sobre R8 full mode (opcional)
android.enableR8.fullMode=false
